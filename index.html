    .input-row input { flex: 1; }
    label { display: block; margin-bottom: 6px; font-weight: 500; font-size: 0.9rem; color: var(--text-muted); }
    input[type="text"], input[type="date"], input[type="time"] {
      width: 100%; padding: 12px 14px; border: 1.5px solid var(--border); border-radius: 8px;
      font-size: 1rem; font-family: var(--font); background: rgba(15, 23, 42, 0.6);
      color: var(--text); transition: all 0.2s; }
    input:focus { outline: none; border-color: var(--primary);

    input[type="date"]::-webkit-calendar-picker-indicator,
    input[type="time"]::-webkit-calendar-picker-indicator {

    .autocomplete-list { position: absolute; top: 100%; left: 0; right: 0;

    .autocomplete-list.active { display: block; }

    .autocomplete-list li:last-child { border-bottom: none; }
    .autocomplete-list li:hover { background: rgba(139, 92, 246, 0.1); color: var(--primary); }
    .btn-now { background: rgba(139, 92, 246, 0.1); border: 1.5px solid rgba(139, 92, 246, 0.3);

    .btn-now:hover { background: rgba(139, 92, 246, 0.2); transform: translateY(-1px); }
    #swapBtn { display: flex; align-items: center; justify-content: center; gap: 6px;
      margin: 0 auto 16px; background: transparent; border: 1.5px solid var(--border);
      padding: 8px 14px; border-radius: 20px; cursor: pointer; font-size: 0.85rem;
      font-weight: 500; color: var(--text-muted); transition: all 0.2s; }
    #swapBtn:hover { background: var(--bg-secondary); color: var(--primary);
      border-color: var(--primary); transform: rotate(180deg); }
    #convertBtn { width: 100%; padding: 16px; margin-top: 12px; background: var(--primary);
      color: white; border: none; border-radius: 8px; font-size: 1rem;
      font-weight: 600; cursor: pointer; transition: all 0.2s; position: relative; }
    #convertBtn:hover:not(:disabled) { background: var(--primary-hover);
      transform: translateY(-1px); box-shadow: 0 10px 20px -5px rgba(139, 92, 246, 0.3); }
    #convertBtn:disabled { background: var(--text-muted); opacity: 0.5; cursor: not-allowed; }
    #convertBtn.loading { color: transparent; }
    #convertBtn.loading::after { content: ""; position: absolute; width: 20px; height: 20px;

      border-top-color: transparent; border-radius: 50%; animation: spin 0.6s linear infinite; }
    @keyframes spin { to { transform: translate(-50%, -50%) rotate(360deg); } }
    .error-msg, .success-msg { font-size: 0.85rem; margin-top: 12px; min-height: 20px; text-align: center; }

    .result-container { margin-top: 24px; padding: 20px; background: rgba(15, 23, 42, 0.6);

    .clock-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }

    .calculator-card::before { content: ""; position: absolute; top: 0; left: 0; right: 0; height: 3px;

    btnNow.onclick=()=>{const d=new Date();dateInput.value=d.toISOString().split('T')[0];timeInput.value=d.toTimeString().slice(0,5);showMessage('Auto-filled','success');};
    function getTZOffsetMinutes(date,tz){const u=date.toLocaleString('en-US',{timeZone:'UTC'}),t=date.toLocaleString('en-US',{timeZone:tz});return Math.round((new Date(t).getTime()-new Date(u).getTime())/60000);}
    form.onsubmit=(e)=>{e.preventDefault();msgBox.textContent='';resultContainer.classList.add('hidden');const sc=sourceInput.value.trim(),tc=targetInput.value.trim();if(!sc||!tc||!dateInput.value||!timeInput.value)return showMessage('Please fill all fields');const sTZ=resolveCity(sc),tTZ=resolveCity(tc);if(!sTZ||!tTZ)return showMessage('City not found: '+(!sTZ?sc:tc));convertBtn.disabled=true;convertBtn.classList.add('loading');setTimeout(()=>{try{const[dp,tp]=(dateInput.value+'T'+timeInput.value).split('T'),[y,m,d]=dp.split('-').map(Number),[h,min]=tp.split(':').map(Number),ub=new Date(Date.UTC(y,m-1,d,h,min)),inst=new Date(ub.getTime()-getTZOffsetMinutes(ub,sTZ)*60000),fo={year:'numeric',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit',hour12:false},st=new Intl.DateTimeFormat('en-GB',{...fo,timeZone:sTZ}).format(inst),tt=new Intl.DateTimeFormat('en-GB',{...fo,timeZone:tTZ}).format(inst),df={weekday:'long'},dtf={day:'numeric',month:'short',year:'numeric'},sd=new Intl.DateTimeFormat('en-US',{...df,timeZone:sTZ}).format(inst),td=new Intl.DateTimeFormat('en-US',{...df,timeZone:tTZ}).format(inst),sda=new Intl.DateTimeFormat('en-US',{...dtf,timeZone:sTZ}).format(inst),tda=new Intl.DateTimeFormat('en-US',{...dtf,timeZone:tTZ}).format(inst),getISO=(tz)=>new Intl.DateTimeFormat('en-CA',{year:'numeric',month:'2-digit',day:'2-digit',timeZone:tz}).format(inst),sD=getISO(sTZ),tD=getISO(tTZ),ds=sD>tD?'next':sD<tD?'previous':'same',fOff=(tz)=>{const mins=getTZOffsetMinutes(inst,tz);return 'UTC'+(mins>=0?'+':'')+mins;};document.getElementById('resSourceCity').textContent=getDisplayName(sc);document.getElementById('resTargetCity').textContent=getDisplayName(tc);document.getElementById('resSourceDay').textContent=sd;document.getElementById('resTargetDay').textContent=td;document.getElementById('resSourceDate').textContent=sda;document.getElementById('resTargetDate').textContent=tda;document.getElementById('resSourceTime').textContent=st;document.getElementById('resTargetTime').textContent=tt;document.getElementById('resSourceOffset').textContent=fOff(sTZ);document.getElementById('resTargetOffset').textContent=fOff(tTZ);const sO=getTZOffsetMinutes(inst,sTZ),tO=getTZOffsetMinutes(inst,tTZ),diffM=Math.abs(tO-sO),diffH=Math.floor(diffM/60),diffMin=diffM%60;document.getElementById('calcDiffValue').textContent=diffH+'h '+diffMin+'m';document.getElementById('calcDiffLabel').textContent=tO>sO?getDisplayName(tc)+' is ahead':getDisplayName(tc)+' is behind';const db=document.getElementById('resDayBadge');db.className='day-badge';db.textContent='Target is on the '+ds+' day';db.classList.add('day-'+ds);resultContainer.classList.remove('hidden');resultContainer.scrollIntoView({behavior:'smooth',block:'nearest'});}catch(err){console.error(err);showMessage('Error converting time');}finally{convertBtn.disabled=false;convertBtn.classList.remove('loading');}},400);};
    copyBtn.onclick=async()=>{const txt=document.getElementById('resSourceCity').textContent+' ('+document.getElementById('resSourceOffset').textContent+'): '+document.getElementById('resSourceTime').textContent+' → '+document.getElementById('resTargetCity').textContent+' ('+document.getElementById('resTargetOffset').textContent+'): '+document.getElementById('resTargetTime').textContent;try{await navigator.clipboard.writeText(txt);copyBtn.textContent='✅ Copied!';}catch{copyBtn.textContent='❌ Failed';}setTimeout(()=>copyBtn.textContent='📋 Copy Result',2000);};
    document.addEventListener('click',(e)=>{if(!e.target.closest('.input-group')){sourceList.classList.remove('active');targetList.classList.remove('active');}});
  </script>
